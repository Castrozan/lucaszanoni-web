name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Edge router worker test
        run: node --test deploy/tests/edge-router/*.test.mjs

      - name: Deploy matrix derivation test
        run: node --test deploy/tests/deploy-matrix/*.test.mjs

      - name: Registry app-directory consistency test
        run: node --test deploy/tests/registry-consistency/*.test.mjs

      - name: Edge nginx serving contract test
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx-light gettext-base
          sh deploy/tests/assert-edge-nginx-serving-contract.sh

      - name: Build
        run: pnpm build
