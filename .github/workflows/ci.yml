name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Edge router worker test
        run: node --test deploy/tests/edge-router/*.test.mjs

      - name: Deploy matrix derivation test
        run: node --test deploy/tests/deploy-matrix/*.test.mjs

      - name: Registry app-directory consistency test
        run: node --test deploy/tests/registry-consistency/*.test.mjs

      - name: App build-config forwarding test
        run: node --test deploy/tests/app-build-config/*.test.mjs

      - name: Synthetic uptime check unit test
        run: node --test deploy/tests/synthetic-uptime/*.test.mjs

      - name: Edge nginx serving contract test
        run: |
          sudo apt-get update
          sudo apt-get install -y nginx-light gettext-base
          sh deploy/tests/assert-edge-nginx-serving-contract.sh

      - name: Cloud Run health-gated rollout test
        run: sh deploy/tests/assert-cloud-run-health-gated-rollout.sh

      - name: Worker rollout smoke-gate test
        run: sh deploy/tests/assert-worker-rollout-smoke-gate.sh

      - name: Build
        run: pnpm build

  cockpit-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm --filter @platform/cockpit exec playwright install --with-deps chromium

      - name: Cockpit keybind e2e
        run: pnpm --filter @platform/cockpit e2e

  cloudflare-edge-module-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.8

      - name: Cloudflare edge module test
        working-directory: infra/modules/cloudflare-edge
        run: |
          tofu init -backend=false -input=false
          tofu test

  cloudflare-access-module-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.11.8

      - name: Cloudflare access module test
        working-directory: infra/modules/cloudflare-access
        run: |
          tofu init -backend=false -input=false
          tofu test
