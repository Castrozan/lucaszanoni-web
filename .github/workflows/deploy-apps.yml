name: deploy-apps

on:
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - deploy/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/deploy-apps.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  workload_identity_provider: projects/933601426694/locations/global/workloadIdentityPools/github-actions/providers/lucaszanoni-web
  deploy_service_account: lucaszanoni-web-deployer@zg-url-shortener-2026.iam.gserviceaccount.com
  gcp_project_id: zg-url-shortener-2026
  gcp_region: southamerica-east1
  artifact_registry_repository: lucaszanoni-web

jobs:
  prepare-deploy-matrix:
    runs-on: ubuntu-latest
    outputs:
      deploy_matrix: ${{ steps.select-deploy-matrix.outputs.deploy_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive the full deploy matrix from the application registry
        id: derive-full-deploy-matrix
        run: |
          full_deploy_matrix="$(jq -c -f deploy/deploy-matrix-from-registry.jq packages/config/src/app-registry.json)"
          full_deploy_matrix_row_count="$(jq '.include | length' <<<"${full_deploy_matrix}")"
          if [ "${full_deploy_matrix_row_count}" -eq 0 ]; then
            echo "::error::The deploy matrix derived from app-registry.json is empty; no in-repo-cloud-run apps to deploy. Refusing to pass green having deployed nothing."
            exit 1
          fi
          echo "full_deploy_matrix=${full_deploy_matrix}" >> "$GITHUB_OUTPUT"

      - name: Enable corepack
        if: vars.ENABLE_CHANGE_SCOPED_DEPLOY == 'true' && github.event_name == 'push'
        run: corepack enable

      - uses: actions/setup-node@v4
        if: vars.ENABLE_CHANGE_SCOPED_DEPLOY == 'true' && github.event_name == 'push'
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies so turbo can compute the affected package set
        if: vars.ENABLE_CHANGE_SCOPED_DEPLOY == 'true' && github.event_name == 'push'
        run: pnpm install --frozen-lockfile

      - name: Scope the deploy matrix to the apps affected by this push
        id: scope-deploy-matrix
        if: vars.ENABLE_CHANGE_SCOPED_DEPLOY == 'true' && github.event_name == 'push'
        env:
          deploy_change_base_ref: ${{ github.event.before }}
          deploy_change_head_ref: ${{ github.sha }}
          FULL_DEPLOY_MATRIX: ${{ steps.derive-full-deploy-matrix.outputs.full_deploy_matrix }}
        run: |
          if ! git cat-file -e "${deploy_change_base_ref}^{commit}" 2>/dev/null; then
            echo "Base ref ${deploy_change_base_ref} is unavailable; forcing a full deploy."
            scoped_deploy_matrix="${FULL_DEPLOY_MATRIX}"
          else
            changed_file_paths="$(git diff --name-only "${deploy_change_base_ref}" "${deploy_change_head_ref}")"
            affected_app_package_names="$(TURBO_SCM_BASE="${deploy_change_base_ref}" TURBO_SCM_HEAD="${deploy_change_head_ref}" npx turbo ls --affected --output=json | jq -c '[.packages.items[].name]')"
            scoped_deploy_matrix="$(AFFECTED_APP_PACKAGE_NAMES="${affected_app_package_names}" CHANGED_FILE_PATHS="${changed_file_paths}" node deploy/deploy-matrix/print-scoped-deploy-matrix.mjs)"
          fi
          echo "scoped_deploy_matrix=${scoped_deploy_matrix}" >> "$GITHUB_OUTPUT"

      - name: Select the scoped matrix when change-scoped deploy is enabled, otherwise the full registry matrix
        id: select-deploy-matrix
        env:
          scoped_deploy_matrix: ${{ steps.scope-deploy-matrix.outputs.scoped_deploy_matrix }}
          full_deploy_matrix: ${{ steps.derive-full-deploy-matrix.outputs.full_deploy_matrix }}
        run: |
          if [ -n "${scoped_deploy_matrix}" ]; then
            echo "deploy_matrix=${scoped_deploy_matrix}" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_matrix=${full_deploy_matrix}" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: prepare-deploy-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-deploy-matrix.outputs.deploy_matrix) }}
    concurrency:
      group: deploy-apps-${{ matrix.service_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.workload_identity_provider }}
          service_account: ${{ env.deploy_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.gcp_region }}-docker.pkg.dev --quiet

      - name: Build and push the micro-frontend image
        env:
          image_repository: ${{ env.gcp_region }}-docker.pkg.dev/${{ env.gcp_project_id }}/${{ env.artifact_registry_repository }}/${{ matrix.app_directory_name }}
          build_profile: ${{ matrix.build_profile }}
          COCKPIT_GITLAB_BASE_URL: ${{ secrets.COCKPIT_GITLAB_BASE_URL }}
          COCKPIT_GITLAB_PROJECT: ${{ secrets.COCKPIT_GITLAB_PROJECT }}
          COCKPIT_MACHINES: ${{ secrets.COCKPIT_MACHINES }}
          COCKPIT_REAL_COMPUTE: ${{ secrets.COCKPIT_REAL_COMPUTE }}
          COCKPIT_WORKSPACE_MACHINES: ${{ secrets.COCKPIT_WORKSPACE_MACHINES }}
        run: |
          case "${build_profile}" in
            static-spa) dockerfile_path="deploy/docker/Dockerfile" ;;
            dynamic-service) dockerfile_path="deploy/docker/dynamic-service.Dockerfile" ;;
            *)
              echo "::error::Unknown build profile '${build_profile}' for service ${{ matrix.service_name }}; expected static-spa or dynamic-service."
              exit 1
              ;;
          esac
          docker build \
            --file "${dockerfile_path}" \
            --build-arg APP_PACKAGE_NAME="${{ matrix.app_package_name }}" \
            --build-arg APP_DIRECTORY_NAME="${{ matrix.app_directory_name }}" \
            --build-arg APP_MOUNT_PATH="${{ matrix.app_mount_path }}" \
            --build-arg ATRIUM_BUILD_SHA="${{ github.sha }}" \
            --build-arg VITE_COCKPIT_GITLAB_BASE_URL="${COCKPIT_GITLAB_BASE_URL}" \
            --build-arg VITE_COCKPIT_GITLAB_PROJECT="${COCKPIT_GITLAB_PROJECT}" \
            --build-arg VITE_COCKPIT_MACHINES="${COCKPIT_MACHINES}" \
            --build-arg VITE_COCKPIT_REAL_COMPUTE="${COCKPIT_REAL_COMPUTE}" \
            --build-arg VITE_COCKPIT_WORKSPACE_MACHINES="${COCKPIT_WORKSPACE_MACHINES}" \
            --tag "${image_repository}:${{ github.sha }}" \
            --tag "${image_repository}:latest" \
            .
          docker push "${image_repository}:${{ github.sha }}"
          docker push "${image_repository}:latest"

      - name: Roll the Cloud Run service onto the new image with a health-gated traffic migration
        env:
          CLOUD_RUN_SERVICE_NAME: ${{ matrix.service_name }}
          CLOUD_RUN_IMAGE_REFERENCE: ${{ env.gcp_region }}-docker.pkg.dev/${{ env.gcp_project_id }}/${{ env.artifact_registry_repository }}/${{ matrix.app_directory_name }}:${{ github.sha }}
          GOOGLE_CLOUD_PROJECT_ID: ${{ env.gcp_project_id }}
          GOOGLE_CLOUD_REGION: ${{ env.gcp_region }}
          CANDIDATE_REVISION_TAG: candidate-${{ github.sha }}
        run: sh deploy/cloud-run/roll-service-onto-image-with-health-gated-traffic-migration.sh
