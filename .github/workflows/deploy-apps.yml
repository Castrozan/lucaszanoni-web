name: deploy-apps

on:
  push:
    branches: [main]
    paths:
      - apps/**
      - packages/**
      - deploy/**
      - pnpm-lock.yaml
      - pnpm-workspace.yaml
      - turbo.json
      - .github/workflows/deploy-apps.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  workload_identity_provider: projects/933601426694/locations/global/workloadIdentityPools/github-actions/providers/lucaszanoni-web
  deploy_service_account: lucaszanoni-web-deployer@zg-url-shortener-2026.iam.gserviceaccount.com
  gcp_project_id: zg-url-shortener-2026
  gcp_region: southamerica-east1
  artifact_registry_repository: lucaszanoni-web

jobs:
  prepare-deploy-matrix:
    runs-on: ubuntu-latest
    outputs:
      deploy_matrix: ${{ steps.derive-deploy-matrix.outputs.deploy_matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: Derive the deploy matrix from the application registry
        id: derive-deploy-matrix
        run: |
          deploy_matrix="$(jq -c -f deploy/deploy-matrix-from-registry.jq packages/config/src/app-registry.json)"
          deploy_matrix_row_count="$(jq '.include | length' <<<"${deploy_matrix}")"
          if [ "${deploy_matrix_row_count}" -eq 0 ]; then
            echo "::error::The deploy matrix derived from app-registry.json is empty; no in-repo-cloud-run apps to deploy. Refusing to pass green having deployed nothing."
            exit 1
          fi
          echo "deploy_matrix=${deploy_matrix}" >> "$GITHUB_OUTPUT"

  build-and-deploy:
    needs: prepare-deploy-matrix
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-deploy-matrix.outputs.deploy_matrix) }}
    concurrency:
      group: deploy-apps-${{ matrix.service_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.workload_identity_provider }}
          service_account: ${{ env.deploy_service_account }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.gcp_region }}-docker.pkg.dev --quiet

      - name: Build and push the micro-frontend image
        env:
          image_repository: ${{ env.gcp_region }}-docker.pkg.dev/${{ env.gcp_project_id }}/${{ env.artifact_registry_repository }}/${{ matrix.app_directory_name }}
          build_profile: ${{ matrix.build_profile }}
        run: |
          case "${build_profile}" in
            static-spa) dockerfile_path="deploy/docker/Dockerfile" ;;
            dynamic-service) dockerfile_path="deploy/docker/dynamic-service.Dockerfile" ;;
            *)
              echo "::error::Unknown build profile '${build_profile}' for service ${{ matrix.service_name }}; expected static-spa or dynamic-service."
              exit 1
              ;;
          esac
          docker build \
            --file "${dockerfile_path}" \
            --build-arg APP_PACKAGE_NAME="${{ matrix.app_package_name }}" \
            --build-arg APP_DIRECTORY_NAME="${{ matrix.app_directory_name }}" \
            --build-arg APP_MOUNT_PATH="${{ matrix.app_mount_path }}" \
            --tag "${image_repository}:${{ github.sha }}" \
            --tag "${image_repository}:latest" \
            .
          docker push "${image_repository}:${{ github.sha }}"
          docker push "${image_repository}:latest"

      - name: Roll the Cloud Run service onto the new image with a health-gated traffic migration
        env:
          CLOUD_RUN_SERVICE_NAME: ${{ matrix.service_name }}
          CLOUD_RUN_IMAGE_REFERENCE: ${{ env.gcp_region }}-docker.pkg.dev/${{ env.gcp_project_id }}/${{ env.artifact_registry_repository }}/${{ matrix.app_directory_name }}:${{ github.sha }}
          GOOGLE_CLOUD_PROJECT_ID: ${{ env.gcp_project_id }}
          GOOGLE_CLOUD_REGION: ${{ env.gcp_region }}
          CANDIDATE_REVISION_TAG: candidate-${{ github.sha }}
        run: sh deploy/cloud-run/roll-service-onto-image-with-health-gated-traffic-migration.sh
