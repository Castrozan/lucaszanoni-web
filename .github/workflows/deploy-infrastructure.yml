name: deploy-infrastructure

on:
  pull_request:
    branches: [main]
    paths:
      - infra/**
      - packages/config/src/app-registry.json
      - .github/workflows/deploy-infrastructure.yml
  push:
    branches: [main]
    paths:
      - infra/**
      - packages/config/src/app-registry.json
      - .github/workflows/deploy-infrastructure.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-infrastructure-production
  cancel-in-progress: false

env:
  workload_identity_provider: projects/933601426694/locations/global/workloadIdentityPools/github-actions/providers/lucaszanoni-web
  deploy_service_account: lucaszanoni-web-deployer@zg-url-shortener-2026.iam.gserviceaccount.com
  terraform_working_directory: infra/environments/production

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.workload_identity_provider }}
          service_account: ${{ env.deploy_service_account }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ env.terraform_working_directory }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.terraform_working_directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_edge_shared_secret_value: ${{ secrets.EDGE_SHARED_SECRET_VALUE }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_enable_cloudflare_edge: ${{ vars.ENABLE_CLOUDFLARE_EDGE || 'false' }}
          TF_VAR_enable_reports_static_gcs_routes: ${{ vars.ENABLE_REPORTS_STATIC_GCS_ROUTES || 'false' }}
          TF_VAR_enable_dotcom_canonical: ${{ vars.ENABLE_DOTCOM_CANONICAL || 'false' }}
          TF_VAR_enable_jarvis_session_tunnel: ${{ vars.ENABLE_JARVIS_SESSION_TUNNEL || 'false' }}
          TF_VAR_jarvis_session_tunnel_secret: ${{ secrets.JARVIS_SESSION_TUNNEL_SECRET }}
          TF_VAR_owner_account_email: ${{ secrets.OWNER_ACCOUNT_EMAIL }}
          TF_VAR_shared_access_audience_email_allowlists: ${{ secrets.SHARED_ACCESS_AUDIENCE_EMAIL_ALLOWLISTS || '{}' }}
          TF_VAR_google_sso_client_id: ${{ secrets.GOOGLE_SSO_CLIENT_ID }}
          TF_VAR_google_sso_client_secret: ${{ secrets.GOOGLE_SSO_CLIENT_SECRET }}
        run: terraform plan -out tfplan -input=false

      - name: Terraform apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: ${{ env.terraform_working_directory }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_edge_shared_secret_value: ${{ secrets.EDGE_SHARED_SECRET_VALUE }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_enable_cloudflare_edge: ${{ vars.ENABLE_CLOUDFLARE_EDGE || 'false' }}
          TF_VAR_enable_reports_static_gcs_routes: ${{ vars.ENABLE_REPORTS_STATIC_GCS_ROUTES || 'false' }}
          TF_VAR_enable_dotcom_canonical: ${{ vars.ENABLE_DOTCOM_CANONICAL || 'false' }}
          TF_VAR_enable_jarvis_session_tunnel: ${{ vars.ENABLE_JARVIS_SESSION_TUNNEL || 'false' }}
          TF_VAR_jarvis_session_tunnel_secret: ${{ secrets.JARVIS_SESSION_TUNNEL_SECRET }}
          TF_VAR_owner_account_email: ${{ secrets.OWNER_ACCOUNT_EMAIL }}
          TF_VAR_shared_access_audience_email_allowlists: ${{ secrets.SHARED_ACCESS_AUDIENCE_EMAIL_ALLOWLISTS || '{}' }}
          TF_VAR_google_sso_client_id: ${{ secrets.GOOGLE_SSO_CLIENT_ID }}
          TF_VAR_google_sso_client_secret: ${{ secrets.GOOGLE_SSO_CLIENT_SECRET }}
        run: terraform apply -input=false tfplan

      - name: Smoke-check the live edge after the worker apply
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && vars.ENABLE_WORKER_ROLLOUT_SMOKE_GATE == 'true' }}
        env:
          BASE_URL: ${{ vars.ENABLE_DOTCOM_CANONICAL == 'true' && 'https://lucaszanoni.com' || 'https://lucaszanoni.com.br' }}
          ALIAS_REDIRECT_HOST: ${{ vars.ENABLE_DOTCOM_CANONICAL == 'true' && 'lucaszanoni.com.br' || '' }}
          REGISTRY_PATH: packages/config/src/app-registry.json
        run: sh deploy/cloudflare/smoke-check-edge-routes.sh
