name: jarvis-emit-connector-credentials

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  workload_identity_provider: projects/933601426694/locations/global/workloadIdentityPools/github-actions/providers/lucaszanoni-web
  deploy_service_account: lucaszanoni-web-deployer@zg-url-shortener-2026.iam.gserviceaccount.com
  terraform_working_directory: infra/environments/production

jobs:
  emit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.workload_identity_provider }}
          service_account: ${{ env.deploy_service_account }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.8

      - name: Terraform init
        working-directory: ${{ env.terraform_working_directory }}
        run: terraform init

      - name: Install age
        run: sudo apt-get update && sudo apt-get install -y age

      - name: Age-encrypt the connector credentials to the host recipients
        working-directory: ${{ env.terraform_working_directory }}
        run: |
          set -euo pipefail
          terraform output -raw jarvis_session_connector_credentials_json \
            | age -a \
              -r 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDXjYtc1kccaHnEeCnLfn5jB+3K8ULqIIsFoq+4pc+fX' \
              -r 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPdOdWOmB7IhmU70+VwgUJ40MHCOwhhrDBn6rq/Fskq/' \
              -r 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAICpNZt8hGVbToPSE0nqVFXsGSM3Zae2tAH/lmVN5rD1x' \
              -r 'ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJw+IAmg/Vwv7U3BKyKl5fE+VidKx3ZPp8fkWJTy4jNG' \
              > connector-credentials.age
          echo "wrote connector-credentials.age ($(wc -c < connector-credentials.age) bytes of age ciphertext)"

      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-connector-credentials-age
          path: ${{ env.terraform_working_directory }}/connector-credentials.age
          retention-days: 1
